apiVersion: apps/v1
kind: Deployment
metadata:
  name: labfat-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: labfat-app
  template:
    metadata:
      labels:
        app: labfat-app
    spec:
      containers:
        - name: labfat-app
          image: labfat-app
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: labfat-service
spec:
  type: NodePort
  selector:
    app: labfat-app
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30007
